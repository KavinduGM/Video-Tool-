# =====================================================================
# AI Video Creator — 9:16 script template
# =====================================================================
# Save a copy of this file per video. Drop it into the "New job" tab or
# pick it from the file dialog. The parser is strict — keep the keys
# exactly as named below.
#
# Required top-level keys: video_name, ratio, output_folder, voice_profile, scenes
# Optional: voice_speed, style (description / colors / fonts)
#
# ---------------------------------------------------------------------
# 9:16 SAFE-ZONE GRID  (canvas 1080 x 1920)
# ---------------------------------------------------------------------
# To stop text from being cropped at the edges, the frame has a strict
# no-go margin and a usable "safe area" split into a grid. Place your
# lines by naming a BAND (and optionally a COLUMN). Everything you write
# is kept inside the safe area automatically — but naming bands gives you
# control over the vertical layout.
#
#   STRICT MARGINS (nothing is placed here):
#     left 60px · right 60px · top 160px · bottom 240px
#     (bottom is largest — that's where TikTok/Reels/Shorts put captions)
#
#   SAFE AREA: x[60 → 1020]  y[160 → 1680]   (960 wide × 1520 tall)
#
#   HORIZONTAL BANDS (top → bottom):
#     TOP     y 160  → 464
#     UPPER   y 464  → 768
#     MIDDLE  y 768  → 1072
#     LOWER   y 1072 → 1376
#     BOTTOM  y 1376 → 1680
#
#   COLUMNS (left → right):   LEFT · CENTER · RIGHT   (default: CENTER)
#
#   HOW TO REFERENCE A ZONE IN A STEP:
#     Just name the band (and optionally the column) in the step text, e.g.
#       "Step 1 (TOP band): heading writes in ..."
#       "Step 3 (MIDDLE band): white line writes in ..."
#       "Step 4 (BOTTOM band, CENTER): yellow line writes in ..."
#     If you don't name bands at all, the lines are simply stacked and
#     centered inside the safe area — still never cropped.
#
#   See templates/zone-map-9x16.svg for a visual of the grid.
# =====================================================================

video_name: "my-9x16-video"          # the final file will be <video_name>.mp4
ratio: "9:16"                         # keep this 9:16 — the grid is tuned for it
output_folder: "C:/Users/me/Desktop/Videos"   # absolute folder path
voice_profile: "Archer New"          # must match a saved profile's display name
voice_speed: 1.0                      # optional, 0.7 – 1.2 (ElevenLabs Turbo v2)

description: |
  Hand-drawn aesthetic throughout, text only. Every element on screen is
  hand-written text that looks like it was written with a marker on black
  paper. Slightly imperfect strokes, natural pen weight. All headings
  write in letter by letter; body lines write in smoothly. Emphasis comes
  from color and a soft pop on the key word. Background stays solid black.
colors:
  - "#000000"   # black background
  - "#F5C842"   # warm yellow — titles, key points
  - "#5BC8F5"   # sky blue — supporting emphasis
  - "#F57C5B"   # coral — warnings
  - "#FFFFFF"   # white — body text
fonts:
  - "Caveat"
  - "Kalam"
  - "Shadows Into Light"

scenes:
  - explainer: |
      Solid black background throughout. Text only, no shapes.

      Step 1 (TOP band):
        A warm yellow (#F5C842) hand-written heading writes in letter by
        letter, center-aligned:
          "What is MTSS?"

      Step 2 (UPPER band):
        A white hand-written line writes in, center-aligned:
          "Multi-Tiered System of Supports"

      Step 3 (MIDDLE band):
        A white hand-written line writes in, center-aligned:
          "A structured way to match students with help"

      Step 4 (LOWER band):
        A white hand-written line writes in, center-aligned, with the
        word "DATA" in warm yellow (#F5C842) and a soft pop as it lands:
          "Every decision runs on DATA"

      Hold the full composition cleanly until the scene ends.
    voiceover: |
      MTSS stands for Multi Tiered System of Supports. It is the
      structured way a school gives each student the right level of help.
      The first thing to lock in is that every decision runs on data.
    transition_out:
      # type: none | fade | dissolve |
      #       slide_left | slide_right | slide_up | slide_down |
      #       wipe_left | wipe_right | wipe_up | wipe_down
      type: fade
      duration: 0.5      # seconds, 0 – 5

  - explainer: |
      Solid black background throughout. Text only, no shapes.

      Step 1 (TOP band):
        A warm yellow (#F5C842) hand-written heading writes in letter by
        letter, center-aligned:
          "Three Levels of Support"

      Step 2 (UPPER band):
        A white hand-written line writes in, center-aligned, with "ALL"
        in sky blue (#5BC8F5):
          "Tier 1  =  ALL students"

      Step 3 (MIDDLE band):
        A white hand-written line writes in, center-aligned, with "SOME"
        in sky blue (#5BC8F5):
          "Tier 2  =  SOME students"

      Step 4 (LOWER band):
        A white hand-written line writes in, center-aligned, with "FEW"
        in sky blue (#5BC8F5):
          "Tier 3  =  FEW students"

      Step 5 (BOTTOM band):
        A warm yellow (#F5C842) hand-written line writes in, center-aligned:
          "Remember it as ALL, SOME, FEW"

      Hold the full composition cleanly until the scene ends.
    voiceover: |
      MTSS organizes help into three tiers. Tier one reaches all students.
      Tier two reaches some in small groups. Tier three reaches the few who
      need the most. The simplest way to hold this is all some few.
    transition_out:
      type: none         # final scene — no transition needed
      duration: 0
